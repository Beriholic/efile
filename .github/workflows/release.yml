name: Release
on:
  push:
    tags: ["*"]

permissions:
  contents: write

jobs:
  release:
    uses: loonghao/rust-actions-toolkit/.github/workflows/reusable-release.yml@v2.5.3
    with:
      target-platforms: |
        [
          {"target": "x86_64-unknown-linux-gnu", "os": "ubuntu-22.04"},
          {"target": "aarch64-apple-darwin", "os": "ubuntu-22.04"},
          {"target": "x86_64-pc-windows-msvc", "os": "ubuntu-22.04"}
        ]
    secrets:
      GITHUB_TOKEN: ${{ secrets.TOKEN }}
